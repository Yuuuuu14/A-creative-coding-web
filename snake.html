<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>顺序跳转贪吃蛇</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a1a; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 5px solid #333; box-shadow: 0 0 20px rgba(0,255,0,0.3); background-color: #000; }
        .info { margin-bottom: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="info" id="status">准备出发...</div>
    <canvas id="snakeGame" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const box = 20;

        // --- 配置区 ---
        const myPages = ["page1.html", "page2.html", "page3.html"];
        
        // 从浏览器缓存读取进度，如果没有则设为 0
        let currentStep = parseInt(localStorage.getItem('snakeLevel')) || 0;
        document.getElementById('status').innerText = `当前目标：前往第 ${currentStep + 1} 个页面`;

        let snake = [{x: 10 * box, y: 10 * box}];
        let food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
        let d = "RIGHT";

        document.addEventListener("keydown", e => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制蛇身
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff00" : "#008800";
                ctx.fillRect(snake[i].x, snake[i].y, box-2, box-2);
            }

            // 绘制果子
            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // --- 穿墙逻辑 (无碰壁死亡) ---
            if (snakeX < 0) snakeX = canvas.width - box;
            else if (snakeX >= canvas.width) snakeX = 0;
            if (snakeY < 0) snakeY = canvas.height - box;
            else if (snakeY >= canvas.height) snakeY = 0;

            // --- 核心：吃到果子的顺序跳转逻辑 ---
            if(snakeX == food.x && snakeY == food.y) {
                clearInterval(game); // 停止游戏

                // 确定要跳转的目标
                let target = myPages[currentStep % myPages.length];
                
                // 更新进度到下一次
                localStorage.setItem('snakeLevel', currentStep + 1);

                alert(`吃到果子！即将跳转到：${target}`);
                window.location.href = target;
                return; 
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };
            snake.unshift(newHead);
        }

        let game = setInterval(draw, 100);

        // 如果想手动重置进度，可以在控制台输入 localStorage.clear()
    </script>
</body>
</html>
